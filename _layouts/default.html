<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'de' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      :root {
        --bg: #f6f3ec;
        --paper: #fffdfa;
        --ink: #1c2226;
        --muted: #626b70;
        --line: rgba(28, 34, 38, 0.14);
        --blue: #155e75;
        --red: #9f2f25;
        --gold: #c28a2c;
        --green: #557a46;
        --shadow: 0 18px 50px rgba(30, 34, 36, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 16% 18%, rgba(194, 138, 44, 0.16), transparent 28rem),
          radial-gradient(circle at 84% 12%, rgba(21, 94, 117, 0.16), transparent 28rem),
          linear-gradient(180deg, #fbf8f1 0%, var(--bg) 45%, #ebe6dc 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      a {
        color: inherit;
      }

      .site-shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 30px 0 48px;
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 38px;
      }

      .brand {
        font-weight: 760;
        letter-spacing: 0.02em;
        text-decoration: none;
      }

      .site-nav {
        display: flex;
        gap: 16px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .site-nav a {
        text-decoration: none;
      }

      main {
        min-height: 68vh;
      }

      .site-footer {
        margin-top: 54px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.92rem;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.06fr) minmax(280px, 0.94fr);
        gap: clamp(28px, 5vw, 68px);
        align-items: center;
        padding: clamp(20px, 4vw, 42px) 0 clamp(34px, 5vw, 60px);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--blue);
        font-size: 0.82rem;
        font-weight: 720;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero h1 {
        max-width: 10ch;
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 9vw, 7.6rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .lede {
        max-width: 62ch;
        margin: 24px 0 0;
        color: #394146;
        font-size: clamp(1.08rem, 2vw, 1.35rem);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--ink);
        color: #fffdfa;
        font-weight: 690;
        text-decoration: none;
      }

      .button.secondary {
        background: rgba(255, 253, 250, 0.62);
        color: var(--ink);
      }

      .title-graphic {
        margin: 0;
        min-height: 320px;
        border: 1px solid rgba(28, 34, 38, 0.12);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .title-graphic img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 320px;
        object-fit: contain;
        background: var(--paper);
      }

      .section-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin: 18px 0 18px;
        padding-top: 28px;
        border-top: 1px solid var(--line);
      }

      .section-heading h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1;
      }

      .section-heading p {
        max-width: 46ch;
        margin: 0;
        color: var(--muted);
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .project-card {
        display: grid;
        min-height: 338px;
        grid-template-rows: 160px 1fr;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 250, 0.72);
        box-shadow: 0 10px 28px rgba(30, 34, 36, 0.08);
        overflow: hidden;
        text-decoration: none;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .project-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 38px rgba(30, 34, 36, 0.14);
      }

      .project-image {
        display: block;
        width: 100%;
        height: 160px;
        object-fit: cover;
        background: #ece7dc;
      }

      .project-art {
        position: relative;
        background:
          linear-gradient(135deg, rgba(21, 94, 117, 0.18), rgba(194, 138, 44, 0.16)),
          #ece7dc;
        overflow: hidden;
      }

      .project-art::before,
      .project-art::after {
        content: "";
        position: absolute;
        inset: 24px;
        border: 2px solid currentColor;
        opacity: 0.56;
      }

      .project-art::after {
        inset: 46px 34px 28px;
        transform: rotate(45deg);
      }

      .project-art.arcs {
        color: var(--blue);
        background:
          repeating-radial-gradient(circle at 30% 70%, transparent 0 18px, rgba(21, 94, 117, 0.55) 19px 21px, transparent 22px 42px),
          #efe8d8;
      }

      .project-art.paths {
        color: var(--red);
        background:
          repeating-linear-gradient(35deg, transparent 0 22px, rgba(159, 47, 37, 0.56) 23px 25px),
          #f2eadb;
      }

      .project-art.rhombi {
        color: var(--green);
        background:
          linear-gradient(60deg, transparent 38%, rgba(85, 122, 70, 0.55) 39% 42%, transparent 43%),
          linear-gradient(120deg, transparent 38%, rgba(194, 138, 44, 0.52) 39% 42%, transparent 43%),
          #f2ecdf;
      }

      .project-copy {
        padding: 18px;
      }

      .project-copy h3 {
        margin: 0 0 8px;
        font-size: 1.12rem;
        line-height: 1.2;
      }

      .project-copy p {
        margin: 0;
        color: var(--muted);
      }

      .project-link {
        display: inline-block;
        margin-top: 14px;
        color: var(--blue);
        font-weight: 720;
      }

      @media (max-width: 850px) {
        .site-header,
        .section-heading {
          align-items: flex-start;
          flex-direction: column;
        }

        .hero {
          grid-template-columns: 1fr;
        }

        .hero h1 {
          max-width: 11ch;
        }

        .project-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header" aria-label="Seitennavigation">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title | default: 'Math Is All You Need' }}</a>
        <nav class="site-nav" aria-label="Projekte">
          <a href="{{ '/arcs/' | relative_url }}">Arcs</a>
          <a href="{{ '/rhombi/' | relative_url }}">Rhombi</a>
        </nav>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <span>Math Is All You Need</span>
      </footer>
    </div>
  </body>
</html>
