<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tiling Arc Playground 2</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(20, 24, 32, 0.82);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e8ebf2;
      --muted: #a8b1c2;
      --accent: #8fd3ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #090a0d;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: grab;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: min(372px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 14px 14px 12px;
      box-shadow: 0 14px 50px rgba(0, 0, 0, 0.35);
      transition: transform 220ms ease;
      overflow: visible;
    }

    .panel.collapsed {
      transform: translateX(calc(-100% - 24px));
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-heading {
      min-width: 0;
      flex: 1;
    }

    .panel-toggle {
      position: absolute;
      top: 14px;
      right: -48px;
      width: 40px;
      min-width: 40px;
      height: 40px;
      border-radius: 12px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .title {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 0;
    }

    .panel-body {
      max-height: calc(100vh - 110px);
      overflow-y: auto;
      padding-right: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
      align-items: center;
    }

    .row-full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    select,
    input[type="range"],
    button {
      width: 100%;
    }

    select,
    button {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    .value {
      font-size: 12px;
      color: var(--text);
      opacity: 0.9;
      text-align: right;
      margin-top: 2px;
      min-height: 16px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 2px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      margin: 0;
      flex-shrink: 0;
    }

    .checkbox-row label {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover {
      background: rgba(255,255,255,0.08);
    }

    button:active {
      transform: translateY(1px);
    }

    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .buttons {
        grid-template-columns: 1fr 1fr;
      }

      .panel {
        width: min(292px, calc(100vw - 68px));
        max-height: calc(100vh - 20px);
        left: 10px;
        top: 10px;
        padding: 12px 12px 10px;
      }

      .panel-body {
        max-height: calc(100vh - 92px);
      }

      .panel.collapsed {
        transform: translateX(calc(-100% - 14px));
      }

      .panel-toggle {
        right: -44px;
        top: 10px;
        width: 38px;
        min-width: 38px;
        height: 38px;
        border-radius: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-heading">
        <div class="title">Tiling Arc Playground 2</div>
        <div class="subtitle">Tap the artwork to hide/show controls. Drag to pan. Wheel or pinch to zoom.</div>
      </div>
      <button id="togglePanel" class="panel-toggle" type="button" aria-label="Hide controls" title="Hide controls">⟨</button>
    </div>

    <div class="panel-body">
      <div class="grid">
        <div>
          <label for="mode">Tiling</label>
          <select id="mode">
            <option value="square">Square</option>
            <option value="hex" selected>Hexagon</option>
            <option value="triangle">Triangle</option>
          </select>
        </div>

        <div>
          <label for="arcColor">Arc color</label>
          <select id="arcColor">
            <option value="#000000">Black</option>
            <option value="#d62828">Red</option>
            <option value="#eaf1ff">Moonlight</option>
            <option value="#bde7d1">Seafoam</option>
            <option value="#d9c8ff">Lavender</option>
            <option value="#ffc857" selected>Rich yellow</option>
            <option value="#ffb3a7">Soft coral</option>
          </select>
        </div>

        <div>
          <label for="squareAnimation">Arc animation</label>
          <select id="squareAnimation">
            <option value="corner" selected>Corner arcs</option>
            <option value="orthogonal">Orthogonal flip</option>
          </select>
        </div>

        <div>
          <label for="backgroundTheme">Background</label>
          <select id="backgroundTheme">
            <option value="dark" selected>Dark gradient</option>
            <option value="black">Black</option>
            <option value="white">White</option>
            <option value="slate">Slate blue</option>
            <option value="forest">Deep forest</option>
            <option value="plum">Muted plum</option>
          </select>
        </div>

        <div>
          <label for="size">Tile size</label>
          <input id="size" type="range" min="32" max="180" value="78" />
          <div class="value" id="sizeValue"></div>
        </div>

        <div>
          <label for="torusScale">Torus size</label>
          <input id="torusScale" type="range" min="0.5" max="3" step="0.05" value="1" />
          <div class="value" id="torusScaleValue"></div>
        </div>

        <div>
          <label for="interactionMode">Interaction</label>
          <select id="interactionMode">
            <option value="random" selected>Random</option>
            <option value="click">Click to flip</option>
          </select>
        </div>

        <div>
          <label for="rate">Random turns / second</label>
          <input id="rate" type="range" min="0" max="12" step="0.1" value="2.3" />
          <div class="value" id="rateValue"></div>
        </div>

        <div>
          <label for="duration">Turn duration</label>
          <input id="duration" type="range" min="0.08" max="2.0" step="0.01" value="0.42" />
          <div class="value" id="durationValue"></div>
        </div>

        <div>
          <label for="lineWidth">Line width</label>
          <input id="lineWidth" type="range" min="1" max="12" step="0.1" value="3.2" />
          <div class="value" id="lineWidthValue"></div>
        </div>

        <div>
          <label for="outline">Outline opacity</label>
          <input id="outline" type="range" min="0" max="1" step="0.01" value="0.18" />
          <div class="value" id="outlineValue"></div>
        </div>

        <div class="row-full checkbox-row">
          <input id="showGrid" type="checkbox" checked />
          <label for="showGrid">Show tile outlines</label>
        </div>

        <div class="row-full checkbox-row">
          <input id="showTorusBounds" type="checkbox" />
          <label for="showTorusBounds">Show torus boundaries</label>
        </div>

        <div class="row-full buttons">
          <button id="randomize">Randomize</button>
          <button id="nudge">Rotate one tile</button>
          <button id="pause">Pause</button>
          <button id="fullscreen">Fullscreen</button>
        </div>
      </div>

      <div class="footer">
        Keyboard: space pauses, enter rotates one tile, arrows pan, +/− zoom, r randomizes, f fullscreen.
      </div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const controls = {
      panel: document.getElementById('panel'),
      togglePanel: document.getElementById('togglePanel'),
      mode: document.getElementById('mode'),
      arcColor: document.getElementById('arcColor'),
      squareAnimation: document.getElementById('squareAnimation'),
      backgroundTheme: document.getElementById('backgroundTheme'),
      size: document.getElementById('size'),
      torusScale: document.getElementById('torusScale'),
      interactionMode: document.getElementById('interactionMode'),
      rate: document.getElementById('rate'),
      duration: document.getElementById('duration'),
      lineWidth: document.getElementById('lineWidth'),
      outline: document.getElementById('outline'),
      showGrid: document.getElementById('showGrid'),
      showTorusBounds: document.getElementById('showTorusBounds'),
      randomize: document.getElementById('randomize'),
      nudge: document.getElementById('nudge'),
      pause: document.getElementById('pause'),
      fullscreen: document.getElementById('fullscreen'),
      sizeValue: document.getElementById('sizeValue'),
      torusScaleValue: document.getElementById('torusScaleValue'),
      rateValue: document.getElementById('rateValue'),
      durationValue: document.getElementById('durationValue'),
      lineWidthValue: document.getElementById('lineWidthValue'),
      outlineValue: document.getElementById('outlineValue'),
    };

    const palette = {
      grid: '#91a0bb',
      backgrounds: {
        dark: { type: 'radial', stops: ['#171c27', '#0f1218', '#090a0d'] },
        black: { type: 'solid', color: '#000000' },
        white: { type: 'solid', color: '#ffffff' },
        slate: { type: 'radial', stops: ['#253247', '#161d2a', '#0f131b'] },
        forest: { type: 'radial', stops: ['#1a2c25', '#0f1714', '#0a0d0b'] },
        plum: { type: 'radial', stops: ['#30253a', '#1a1520', '#100d13'] },
      }
    };

    const state = {
      width: window.innerWidth,
      height: window.innerHeight,
      mode: controls.mode.value,
      arcColor: controls.arcColor.value,
      squareAnimation: controls.squareAnimation.value,
      backgroundTheme: controls.backgroundTheme.value,
      size: Number(controls.size.value),
      torusScale: Number(controls.torusScale.value),
      interactionMode: controls.interactionMode.value,
      rate: Number(controls.rate.value),
      duration: Number(controls.duration.value),
      lineWidth: Number(controls.lineWidth.value),
      outline: Number(controls.outline.value),
      showGrid: controls.showGrid.checked,
      showTorusBounds: controls.showTorusBounds.checked,
      panelCollapsed: window.innerWidth <= 640,
      paused: false,
      cameraX: 0,
      cameraY: 0,
      torus: null,
      lastTime: performance.now(),
      mobileInitialized: false,
      pointers: new Map(),
      drag: null,
      pinch: null,
    };

    function hexToRgba(hex, alpha) {
      const clean = hex.replace('#', '');
      const value = parseInt(clean, 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    function vec(x, y) {
      return { x, y };
    }

    function add(a, b) {
      return { x: a.x + b.x, y: a.y + b.y };
    }

    function sub(a, b) {
      return { x: a.x - b.x, y: a.y - b.y };
    }

    function mul(a, t) {
      return { x: a.x * t, y: a.y * t };
    }

    function centroid(verts) {
      let x = 0, y = 0;
      for (const p of verts) {
        x += p.x;
        y += p.y;
      }
      return { x: x / verts.length, y: y / verts.length };
    }

    function midpoint(a, b) {
      return { x: 0.5 * (a.x + b.x), y: 0.5 * (a.y + b.y) };
    }

    function normalizeAngle(a) {
      while (a <= -Math.PI) a += 2 * Math.PI;
      while (a > Math.PI) a -= 2 * Math.PI;
      return a;
    }

    function selectedIndices(mode) {
      if (mode === 'square') return [0, 2];
      if (mode === 'hex') return [0, 2, 4];
      return [0];
    }

    function usesOrthogonalFlip() {
      return state.squareAnimation === 'orthogonal' && (state.mode === 'square' || state.mode === 'hex');
    }

    function stepAngle(mode) {
      if (mode === 'square') return usesOrthogonalFlip() ? 1 : Math.PI / 2;
      if (mode === 'hex') return usesOrthogonalFlip() ? 1 : Math.PI / 3;
      return 2 * Math.PI / 3;
    }

    function squareVertices(cx, cy, s) {
      const h = s / 2;
      return [
        { x: cx - h, y: cy - h },
        { x: cx + h, y: cy - h },
        { x: cx + h, y: cy + h },
        { x: cx - h, y: cy + h },
      ];
    }

    function hexVertices(cx, cy, r) {
      const verts = [];
      for (let k = 0; k < 6; k++) {
        const a = -Math.PI / 2 + k * Math.PI / 3;
        verts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
      }
      return verts;
    }

    function triangleVertices(x, y, s, up) {
      const h = Math.sqrt(3) * s / 2;
      if (up) {
        return [
          { x: x + s / 2, y: y },
          { x: x + s, y: y + h },
          { x: x, y: y + h },
        ];
      }
      return [
        { x: x, y: y },
        { x: x + s, y: y },
        { x: x + s / 2, y: y + h },
      ];
    }

    function makeTile(i, j, step, states) {
      const phase = Math.floor(Math.random() * states) * step;
      return { i, j, angle: phase, target: phase, step };
    }

    function buildTorus(options = {}) {
      const preserve = Boolean(options.preserve) && state.torus && state.torus.mode === state.mode;
      const previous = preserve ? state.torus : null;
      const s = state.size;
      const maxDim = Math.max(state.width, state.height);
      const scale = state.torusScale;
      let nx, ny, states;

      if (state.mode === 'square') {
        nx = clamp(Math.round((Math.ceil(maxDim / s) + 6) * scale), 8, 96);
        ny = clamp(Math.round((Math.ceil(maxDim / s) + 6) * scale), 8, 96);
        states = usesOrthogonalFlip() ? 2 : 4;
      } else if (state.mode === 'hex') {
        const r = s / 2;
        nx = clamp(Math.round((Math.ceil(maxDim / (Math.sqrt(3) * r)) + 8) * scale), 8, 96);
        ny = clamp(Math.round((Math.ceil(maxDim / (1.5 * r)) + 8) * scale), 8, 96);
        states = usesOrthogonalFlip() ? 2 : 6;
      } else {
        const h = Math.sqrt(3) * s / 2;
        nx = clamp(Math.round((Math.ceil(maxDim / (s / 2)) + 8) * scale), 10, 120);
        ny = clamp(Math.round((Math.ceil(maxDim / h) + 8) * scale), 10, 120);
        if (nx % 2) nx += 1;
        if (ny % 2) ny += 1;
        states = 3;
      }

      const step = stepAngle(state.mode);
      const tiles = [];
      for (let j = 0; j < ny; j++) {
        for (let i = 0; i < nx; i++) {
          if (previous && i < previous.nx && j < previous.ny) {
            const tile = previous.tiles[j * previous.nx + i];
            tiles.push({ i, j, angle: tile.angle, target: tile.target, step });
          } else {
            tiles.push(makeTile(i, j, step, states));
          }
        }
      }

      state.torus = { nx, ny, tiles, step, mode: state.mode };
    }

    function tileAt(i, j) {
      const { nx, ny, tiles } = state.torus;
      const ii = mod(i, nx);
      const jj = mod(j, ny);
      return tiles[jj * nx + ii];
    }

    function torusBasis() {
      const { nx, ny } = state.torus;
      const s = state.size;
      if (state.mode === 'square') {
        return [vec(nx * s, 0), vec(0, ny * s)];
      }
      if (state.mode === 'hex') {
        const r = s / 2;
        const dx = Math.sqrt(3) * r;
        const dy = 1.5 * r;
        return [vec(nx * dx, 0), vec(ny * dx / 2, ny * dy)];
      }
      const h = Math.sqrt(3) * s / 2;
      return [vec((nx * s) / 2, 0), vec(0, ny * h)];
    }

    function reduceByBasis(v, a, b) {
      const det = a.x * b.y - a.y * b.x;
      if (Math.abs(det) < 1e-9) return v;
      const alpha = (v.x * b.y - v.y * b.x) / det;
      const beta = (a.x * v.y - a.y * v.x) / det;
      const fa = alpha - Math.floor(alpha);
      const fb = beta - Math.floor(beta);
      return add(mul(a, fa), mul(b, fb));
    }

    function copySpan(v) {
      return Math.abs(v.x) + Math.abs(v.y);
    }

    function copyRange() {
      if (!state.torus) return { a: 1, b: 1 };
      const [A, B] = torusBasis();
      const reach = state.width + state.height + state.size * 2;
      const spanA = Math.max(1, copySpan(A));
      const spanB = Math.max(1, copySpan(B));
      return {
        a: Math.max(1, Math.ceil(reach / spanA) + 1),
        b: Math.max(1, Math.ceil(reach / spanB) + 1),
      };
    }

    function drawTorusBoundaries() {
      if (!state.showTorusBounds || !state.torus) return;

      const [A, B] = torusBasis();
      const cam = reduceByBasis(vec(state.cameraX, state.cameraY), A, B);
      const copies = copyRange();

      ctx.save();
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = state.backgroundTheme === 'white'
        ? 'rgba(20, 28, 40, 0.55)'
        : 'rgba(255, 255, 255, 0.4)';

      for (let i = -copies.a - 1; i <= copies.a + 1; i++) {
        const base = add(mul(A, i), mul(B, -copies.b - 2));
        ctx.beginPath();
        ctx.moveTo(base.x - cam.x, base.y - cam.y);
        ctx.lineTo(base.x + (copies.b * 2 + 4) * B.x - cam.x, base.y + (copies.b * 2 + 4) * B.y - cam.y);
        ctx.stroke();
      }

      for (let j = -copies.b - 1; j <= copies.b + 1; j++) {
        const base = add(mul(B, j), mul(A, -copies.a - 2));
        ctx.beginPath();
        ctx.moveTo(base.x - cam.x, base.y - cam.y);
        ctx.lineTo(base.x + (copies.a * 2 + 4) * A.x - cam.x, base.y + (copies.a * 2 + 4) * A.y - cam.y);
        ctx.stroke();
      }

      ctx.setLineDash([]);
      ctx.restore();
    }

    function updateLabels() {
      controls.sizeValue.textContent = `${Math.round(state.size)} px`;
      controls.torusScaleValue.textContent = `${state.torusScale.toFixed(2)}x`;
      controls.rateValue.textContent = `${state.rate.toFixed(1)}`;
      controls.durationValue.textContent = `${state.duration.toFixed(2)} s`;
      controls.lineWidthValue.textContent = `${state.lineWidth.toFixed(1)} px`;
      controls.outlineValue.textContent = `${Math.round(state.outline * 100)}%`;
      controls.pause.textContent = state.paused ? 'Resume' : 'Pause';
      controls.fullscreen.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
      controls.togglePanel.textContent = state.panelCollapsed ? '⟩' : '⟨';
      controls.togglePanel.setAttribute('aria-label', state.panelCollapsed ? 'Show controls' : 'Hide controls');
      controls.togglePanel.title = state.panelCollapsed ? 'Show controls' : 'Hide controls';
      controls.panel.classList.toggle('collapsed', state.panelCollapsed);
      controls.size.value = String(state.size);
      controls.torusScale.value = String(state.torusScale);
    }

    function resize() {
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(state.width * dpr);
      canvas.height = Math.round(state.height * dpr);
      canvas.style.width = `${state.width}px`;
      canvas.style.height = `${state.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (window.innerWidth <= 640 && !state.mobileInitialized) {
        state.panelCollapsed = true;
        state.mobileInitialized = true;
      } else if (window.innerWidth > 640) {
        state.mobileInitialized = false;
      }

      buildTorus({ preserve: true });
      updateLabels();
    }

    function polygonPath(verts) {
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
      ctx.closePath();
    }

    function drawArcPolyline(center, p1, p2) {
      const r = Math.hypot(p1.x - center.x, p1.y - center.y);
      const a1 = Math.atan2(p1.y - center.y, p1.x - center.x);
      const a2 = Math.atan2(p2.y - center.y, p2.x - center.x);
      const delta = normalizeAngle(a2 - a1);
      const n = Math.max(24, Math.ceil(Math.abs(delta) * r / 5));

      for (let j = 0; j <= n; j++) {
        const t = j / n;
        const a = a1 + delta * t;
        const x = center.x + r * Math.cos(a);
        const y = center.y + r * Math.sin(a);
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
    }

    function drawOrthogonalArcByPoints(p1, p2, guideRadius, guideCenter) {
      const ux1 = (p1.x - guideCenter.x) / guideRadius;
      const uy1 = (p1.y - guideCenter.y) / guideRadius;
      const ux2 = (p2.x - guideCenter.x) / guideRadius;
      const uy2 = (p2.y - guideCenter.y) / guideRadius;
      const wx = ux1 + ux2;
      const wy = uy1 + uy2;
      const wLen = Math.hypot(wx, wy);

      if (wLen < 1e-6) {
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        return;
      }

      const dot = clamp(ux1 * ux2 + uy1 * uy2, -0.999999, 0.999999);
      const scale = guideRadius / (1 + dot);
      const center = {
        x: guideCenter.x + scale * wx,
        y: guideCenter.y + scale * wy,
      };
      drawArcPolyline(center, p1, p2);
    }

    function drawMotif(verts) {
      if (usesOrthogonalFlip() && state.mode === 'square') {
        const top = midpoint(verts[0], verts[1]);
        const bottom = midpoint(verts[2], verts[3]);
        const center = centroid(verts);
        const guideRadius = Math.hypot(top.x - center.x, top.y - center.y);
        const s = clamp(state.currentTilePhase ?? 0, 0, 1);
        const topEnd = {
          x: center.x + guideRadius * Math.cos(Math.PI * (1 - s)),
          y: center.y + guideRadius * Math.sin(Math.PI * (1 - s)),
        };
        const bottomEnd = {
          x: center.x + guideRadius * Math.cos(-Math.PI * s),
          y: center.y + guideRadius * Math.sin(-Math.PI * s),
        };
        ctx.beginPath();
        drawOrthogonalArcByPoints(top, topEnd, guideRadius, center);
        drawOrthogonalArcByPoints(bottom, bottomEnd, guideRadius, center);
        ctx.stroke();
        return;
      }

      if (usesOrthogonalFlip() && state.mode === 'hex') {
        const center = centroid(verts);
        const midpoints = [];
        for (let i = 0; i < 6; i++) {
          midpoints.push(midpoint(verts[i], verts[(i + 1) % 6]));
        }
        const guideRadius = Math.hypot(midpoints[0].x - center.x, midpoints[0].y - center.y);
        const s = clamp(state.currentTilePhase ?? 0, 0, 1);
        ctx.beginPath();
        for (let k = 0; k < 3; k++) {
          const fixed = midpoints[2 * k];
          const movingStartAngle = Math.atan2(midpoints[(2 * k + 5) % 6].y - center.y, midpoints[(2 * k + 5) % 6].x - center.x);
          // Use the complementary sweep so the moving midpoint does not pass through the fixed endpoint.
          const movingAngle = movingStartAngle - s * (4 * Math.PI / 3);
          const moving = {
            x: center.x + guideRadius * Math.cos(movingAngle),
            y: center.y + guideRadius * Math.sin(movingAngle),
          };
          drawOrthogonalArcByPoints(fixed, moving, guideRadius, center);
        }
        ctx.stroke();
        return;
      }

      const picks = selectedIndices(state.mode);
      ctx.beginPath();
      for (const i of picks) {
        const n = verts.length;
        const v = verts[i % n];
        const prev = verts[(i - 1 + n) % n];
        const next = verts[(i + 1) % n];
        const m1 = midpoint(prev, v);
        const m2 = midpoint(v, next);
        drawArcPolyline(v, m1, m2);
      }
      ctx.stroke();
    }

    function drawBackground() {
      const theme = palette.backgrounds[state.backgroundTheme] || palette.backgrounds.dark;
      if (theme.type === 'solid') {
        ctx.fillStyle = theme.color;
        ctx.fillRect(0, 0, state.width, state.height);
        return;
      }
      const grad = ctx.createRadialGradient(
        state.width * 0.30, state.height * 0.25, 40,
        state.width * 0.30, state.height * 0.25, Math.max(state.width, state.height)
      );
      grad.addColorStop(0, theme.stops[0]);
      grad.addColorStop(0.45, theme.stops[1]);
      grad.addColorStop(1, theme.stops[2]);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function drawOneTile(verts, center, angle) {
      ctx.save();
      polygonPath(verts);
      ctx.clip();

      if (!usesOrthogonalFlip()) {
        ctx.translate(center.x, center.y);
        ctx.rotate(angle);
        ctx.translate(-center.x, -center.y);
      }

      const onLight = state.backgroundTheme === 'white';
      const shadowColor = onLight ? hexToRgba(state.arcColor, 0.08) : hexToRgba(state.arcColor, 0.14);
      state.currentTilePhase = angle;

      ctx.strokeStyle = shadowColor;
      ctx.lineWidth = state.lineWidth + 5;
      drawMotif(verts);

      ctx.strokeStyle = state.arcColor;
      ctx.lineWidth = state.lineWidth;
      drawMotif(verts);
      state.currentTilePhase = null;

      ctx.restore();

      if (state.showGrid && state.outline > 0) {
        polygonPath(verts);
        ctx.strokeStyle = onLight
          ? `rgba(70, 82, 100, ${state.outline})`
          : `rgba(145, 160, 187, ${state.outline})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    function drawSquareTiles() {
      const s = state.size;
      const [A, B] = torusBasis();
      const cam = reduceByBasis(vec(state.cameraX, state.cameraY), A, B);
      const copies = copyRange();

      for (let copyY = -copies.b; copyY <= copies.b; copyY++) {
        for (let copyX = -copies.a; copyX <= copies.a; copyX++) {
          for (let j = 0; j < state.torus.ny; j++) {
            for (let i = 0; i < state.torus.nx; i++) {
              const tile = tileAt(i, j);
              const cx = (i + 0.5) * s + copyX * A.x + copyY * B.x - cam.x;
              const cy = (j + 0.5) * s + copyX * A.y + copyY * B.y - cam.y;
              if (cx < -s || cx > state.width + s || cy < -s || cy > state.height + s) continue;
              drawOneTile(squareVertices(cx, cy, s), { x: cx, y: cy }, tile.angle);
            }
          }
        }
      }
    }

    function drawHexTiles() {
      const s = state.size;
      const r = s / 2;
      const dx = Math.sqrt(3) * r;
      const dy = 1.5 * r;
      const [A, B] = torusBasis();
      const cam = reduceByBasis(vec(state.cameraX, state.cameraY), A, B);
      const copies = copyRange();

      for (let copyB = -copies.b; copyB <= copies.b; copyB++) {
        for (let copyA = -copies.a; copyA <= copies.a; copyA++) {
          for (let j = 0; j < state.torus.ny; j++) {
            for (let i = 0; i < state.torus.nx; i++) {
              const tile = tileAt(i, j);
              const baseX = dx * (i + j / 2);
              const baseY = dy * j;
              const cx = baseX + copyA * A.x + copyB * B.x - cam.x;
              const cy = baseY + copyA * A.y + copyB * B.y - cam.y;
              if (cx < -s || cx > state.width + s || cy < -s || cy > state.height + s) continue;
              drawOneTile(hexVertices(cx, cy, r), { x: cx, y: cy }, tile.angle);
            }
          }
        }
      }
    }

    function drawTriangleTiles() {
      const s = state.size;
      const half = s / 2;
      const h = Math.sqrt(3) * s / 2;
      const [A, B] = torusBasis();
      const cam = reduceByBasis(vec(state.cameraX, state.cameraY), A, B);
      const copies = copyRange();

      for (let copyB = -copies.b; copyB <= copies.b; copyB++) {
        for (let copyA = -copies.a; copyA <= copies.a; copyA++) {
          for (let j = 0; j < state.torus.ny; j++) {
            for (let i = 0; i < state.torus.nx; i++) {
              const tile = tileAt(i, j);
              const x = i * half + copyA * A.x + copyB * B.x - cam.x;
              const y = j * h + copyA * A.y + copyB * B.y - cam.y;
              const up = ((i + j) % 2 === 0);
              const verts = triangleVertices(x, y, s, up);
              const c = centroid(verts);
              if (c.x < -s || c.x > state.width + s || c.y < -s || c.y > state.height + s) continue;
              drawOneTile(verts, c, tile.angle);
            }
          }
        }
      }
    }

    function drawTiles() {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      if (!state.torus) return;
      if (state.mode === 'square') drawSquareTiles();
      else if (state.mode === 'hex') drawHexTiles();
      else drawTriangleTiles();
    }

    function flipTile(tile) {
      if (!tile) return;
      if (usesOrthogonalFlip()) {
        tile.target = tile.target < 0.5 ? 1 : 0;
      } else {
        tile.target += tile.step;
      }
    }

    function randomTurn() {
      if (!state.torus || !state.torus.tiles.length) return;
      const tile = state.torus.tiles[(Math.random() * state.torus.tiles.length) | 0];
      flipTile(tile);
    }

    function randomize() {
      buildTorus({ preserve: false });
    }

    function setTileSize(newSize, anchorX = state.width / 2, anchorY = state.height / 2) {
      const min = Number(controls.size.min);
      const max = Number(controls.size.max);
      const oldSize = state.size;
      const size = clamp(newSize, min, max);
      if (Math.abs(size - oldSize) < 1e-6) return;
      const ux = (anchorX + state.cameraX) / oldSize;
      const uy = (anchorY + state.cameraY) / oldSize;
      state.size = size;
      state.cameraX = size * ux - anchorX;
      state.cameraY = size * uy - anchorY;
      updateLabels();
    }

    function update(dt) {
      if (!state.paused && state.interactionMode === 'random' && state.rate > 0) {
        let expected = state.rate * dt;
        while (expected > 1) {
          randomTurn();
          expected -= 1;
        }
        if (Math.random() < expected) randomTurn();
      }

      const angularSpeed = stepAngle(state.mode) / Math.max(0.01, state.duration);
      if (!state.torus) return;
      for (const tile of state.torus.tiles) {
        const diff = tile.target - tile.angle;
        if (Math.abs(diff) < 1e-5) {
          tile.angle = tile.target;
          continue;
        }
        const step = angularSpeed * dt;
        if (diff > 0) tile.angle = Math.min(tile.angle + step, tile.target);
        else tile.angle = Math.max(tile.angle - step, tile.target);
      }
    }

    function draw() {
      drawBackground();
      drawTiles();
      drawTorusBoundaries();
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - state.lastTime) / 1000);
      state.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }

    function syncStateFromControls(options = {}) {
      const rebuild = Boolean(options.rebuild);
      const sizeChange = Boolean(options.sizeChange);
      state.mode = controls.mode.value;
      state.arcColor = controls.arcColor.value;
      state.squareAnimation = controls.squareAnimation.value;
      state.backgroundTheme = controls.backgroundTheme.value;
      state.torusScale = Number(controls.torusScale.value);
      state.interactionMode = controls.interactionMode.value;
      state.rate = Number(controls.rate.value);
      state.duration = Number(controls.duration.value);
      state.lineWidth = Number(controls.lineWidth.value);
      state.outline = Number(controls.outline.value);
      state.showGrid = controls.showGrid.checked;
      state.showTorusBounds = controls.showTorusBounds.checked;
      updateLabels();
      if (sizeChange) {
        setTileSize(Number(controls.size.value));
      } else if (rebuild) {
        buildTorus({ preserve: false });
      }
    }

    function togglePanel() {
      state.panelCollapsed = !state.panelCollapsed;
      updateLabels();
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        console.warn('Fullscreen toggle failed:', error);
      } finally {
        updateLabels();
      }
    }

    function drawPointerState() {
      canvas.classList.toggle('dragging', Boolean(state.drag && state.drag.moved));
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    function pointInPolygon(point, verts) {
      let inside = false;
      for (let i = 0, j = verts.length - 1; i < verts.length; j = i++) {
        const xi = verts[i].x;
        const yi = verts[i].y;
        const xj = verts[j].x;
        const yj = verts[j].y;
        const intersect = ((yi > point.y) !== (yj > point.y))
          && (point.x < ((xj - xi) * (point.y - yi)) / ((yj - yi) || 1e-9) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function tileAtCanvasPoint(point) {
      if (!state.torus || (state.mode !== 'square' && state.mode !== 'hex')) return null;
      const layouts = [];
      if (state.mode === 'square') {
        const s = state.size;
        const [A, B] = torusBasis();
        const cam = reduceByBasis(vec(state.cameraX, state.cameraY), A, B);
        const copies = copyRange();
        for (let copyY = -copies.b; copyY <= copies.b; copyY++) {
          for (let copyX = -copies.a; copyX <= copies.a; copyX++) {
            for (let j = 0; j < state.torus.ny; j++) {
              for (let i = 0; i < state.torus.nx; i++) {
                const tile = tileAt(i, j);
                const cx = (i + 0.5) * s + copyX * A.x + copyY * B.x - cam.x;
                const cy = (j + 0.5) * s + copyX * A.y + copyY * B.y - cam.y;
                if (cx < -s || cx > state.width + s || cy < -s || cy > state.height + s) continue;
                layouts.push({ tile, verts: squareVertices(cx, cy, s), center: { x: cx, y: cy } });
              }
            }
          }
        }
      } else if (state.mode === 'hex') {
        const s = state.size;
        const r = s / 2;
        const dx = Math.sqrt(3) * r;
        const dy = 1.5 * r;
        const [A, B] = torusBasis();
        const cam = reduceByBasis(vec(state.cameraX, state.cameraY), A, B);
        const copies = copyRange();
        for (let copyB = -copies.b; copyB <= copies.b; copyB++) {
          for (let copyA = -copies.a; copyA <= copies.a; copyA++) {
            for (let j = 0; j < state.torus.ny; j++) {
              for (let i = 0; i < state.torus.nx; i++) {
                const tile = tileAt(i, j);
                const baseX = dx * (i + j / 2);
                const baseY = dy * j;
                const cx = baseX + copyA * A.x + copyB * B.x - cam.x;
                const cy = baseY + copyA * A.y + copyB * B.y - cam.y;
                if (cx < -s || cx > state.width + s || cy < -s || cy > state.height + s) continue;
                layouts.push({ tile, verts: hexVertices(cx, cy, r), center: { x: cx, y: cy } });
              }
            }
          }
        }
      }

      for (let i = layouts.length - 1; i >= 0; i--) {
        if (pointInPolygon(point, layouts[i].verts)) return layouts[i].tile;
      }
      return null;
    }

    function handlePointerDown(event) {
      if (event.target !== canvas) return;
      const p = canvasPoint(event);
      state.pointers.set(event.pointerId, p);
      canvas.setPointerCapture(event.pointerId);

      if (state.pointers.size === 1) {
        state.drag = {
          pointerId: event.pointerId,
          start: p,
          startCameraX: state.cameraX,
          startCameraY: state.cameraY,
          moved: false,
        };
        state.pinch = null;
      } else if (state.pointers.size === 2) {
        const pts = [...state.pointers.values()];
        const center = { x: 0.5 * (pts[0].x + pts[1].x), y: 0.5 * (pts[0].y + pts[1].y) };
        const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
        state.pinch = {
          startSize: state.size,
          startCenter: center,
          worldX: (center.x + state.cameraX) / state.size,
          worldY: (center.y + state.cameraY) / state.size,
          startDist: Math.max(1, dist),
        };
        state.drag = null;
      }
      drawPointerState();
    }

    function handlePointerMove(event) {
      if (!state.pointers.has(event.pointerId)) return;
      const p = canvasPoint(event);
      state.pointers.set(event.pointerId, p);

      if (state.pointers.size === 2 && state.pinch) {
        const pts = [...state.pointers.values()];
        const center = { x: 0.5 * (pts[0].x + pts[1].x), y: 0.5 * (pts[0].y + pts[1].y) };
        const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
        const factor = dist / state.pinch.startDist;
        const newSize = clamp(state.pinch.startSize * factor, Number(controls.size.min), Number(controls.size.max));
        state.size = newSize;
        state.cameraX = newSize * state.pinch.worldX - center.x;
        state.cameraY = newSize * state.pinch.worldY - center.y;
        controls.size.value = String(state.size);
        updateLabels();
        drawPointerState();
        return;
      }

      if (state.drag && state.drag.pointerId === event.pointerId) {
        const dx = p.x - state.drag.start.x;
        const dy = p.y - state.drag.start.y;
        state.cameraX = state.drag.startCameraX - dx;
        state.cameraY = state.drag.startCameraY - dy;
        if (Math.hypot(dx, dy) > 8) state.drag.moved = true;
        drawPointerState();
      }
    }

    function handlePointerUp(event) {
      if (state.pointers.has(event.pointerId)) state.pointers.delete(event.pointerId);
      if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);

      if (state.pointers.size < 2) state.pinch = null;

      if (state.drag && state.drag.pointerId === event.pointerId) {
        const wasTap = !state.drag.moved;
        state.drag = null;
        if (wasTap) {
          if (state.interactionMode === 'click') {
            const p = canvasPoint(event);
            const tile = tileAtCanvasPoint(p);
            if (tile) flipTile(tile);
            else togglePanel();
          } else {
            togglePanel();
          }
        }
      } else if (state.pointers.size === 1) {
        const [id, p] = [...state.pointers.entries()][0];
        state.drag = {
          pointerId: id,
          start: p,
          startCameraX: state.cameraX,
          startCameraY: state.cameraY,
          moved: false,
        };
      }
      drawPointerState();
    }

    function handleWheel(event) {
      if (event.target !== canvas) return;
      event.preventDefault();
      const p = canvasPoint(event);
      const factor = Math.exp(-event.deltaY * 0.0012);
      setTileSize(state.size * factor, p.x, p.y);
    }

    controls.mode.addEventListener('change', () => syncStateFromControls({ rebuild: true }));
    controls.arcColor.addEventListener('change', () => syncStateFromControls());
    controls.squareAnimation.addEventListener('change', () => syncStateFromControls({ rebuild: true }));
    controls.backgroundTheme.addEventListener('change', () => syncStateFromControls());
    controls.size.addEventListener('input', () => syncStateFromControls({ sizeChange: true }));
    controls.torusScale.addEventListener('input', () => syncStateFromControls({ rebuild: true }));
    controls.interactionMode.addEventListener('change', () => syncStateFromControls());
    controls.rate.addEventListener('input', () => syncStateFromControls());
    controls.duration.addEventListener('input', () => syncStateFromControls());
    controls.lineWidth.addEventListener('input', () => syncStateFromControls());
    controls.outline.addEventListener('input', () => syncStateFromControls());
    controls.showGrid.addEventListener('change', () => syncStateFromControls());
    controls.showTorusBounds.addEventListener('change', () => syncStateFromControls());
    controls.randomize.addEventListener('click', randomize);
    controls.nudge.addEventListener('click', randomTurn);
    controls.pause.addEventListener('click', () => {
      state.paused = !state.paused;
      updateLabels();
    });
    controls.fullscreen.addEventListener('click', toggleFullscreen);
    controls.togglePanel.addEventListener('click', togglePanel);

    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointercancel', handlePointerUp);
    canvas.addEventListener('wheel', handleWheel, { passive: false });
    document.addEventListener('fullscreenchange', updateLabels);

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', (event) => {
      const pan = Math.max(20, state.size * 0.35);
      if (event.key === ' ') {
        event.preventDefault();
        state.paused = !state.paused;
        updateLabels();
      } else if (event.key.toLowerCase() === 'r') {
        randomize();
      } else if (event.key === 'Enter') {
        randomTurn();
      } else if (event.key === 'ArrowLeft') {
        state.cameraX -= pan;
      } else if (event.key === 'ArrowRight') {
        state.cameraX += pan;
      } else if (event.key === 'ArrowUp') {
        state.cameraY -= pan;
      } else if (event.key === 'ArrowDown') {
        state.cameraY += pan;
      } else if (event.key === '+' || event.key === '=') {
        setTileSize(state.size * 1.08);
      } else if (event.key === '-') {
        setTileSize(state.size / 1.08);
      } else if (event.key.toLowerCase() === 'f') {
        event.preventDefault();
        toggleFullscreen();
      }
    });

    resize();
    updateLabels();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
