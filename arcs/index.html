<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiling Arc Playground</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0c10;
      --panel: rgba(20, 24, 32, 0.82);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e8ebf2;
      --muted: #a8b1c2;
      --accent: #8fd3ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #161a23 0%, #0b0c10 55%, #07080b 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: min(372px, calc(100vw - 32px));
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 14px 14px 12px;
      box-shadow: 0 14px 50px rgba(0, 0, 0, 0.35);
      transition: transform 220ms ease;
      overflow: visible;
    }

    .panel.collapsed {
      transform: translateX(calc(-100% - 24px));
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-heading {
      min-width: 0;
      flex: 1;
    }

    .panel-toggle {
      position: absolute;
      top: 14px;
      right: -48px;
      width: 40px;
      min-width: 40px;
      height: 40px;
      border-radius: 12px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .title {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
      align-items: center;
    }

    .row-full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    select,
    input[type="range"],
    button {
      width: 100%;
    }

    select,
    button {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    .value {
      font-size: 12px;
      color: var(--text);
      opacity: 0.9;
      text-align: right;
      margin-top: 2px;
      min-height: 16px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 2px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      margin: 0;
      flex-shrink: 0;
    }

    .checkbox-row label {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover {
      background: rgba(255,255,255,0.08);
    }

    button:active {
      transform: translateY(1px);
    }

    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .buttons {
        grid-template-columns: 1fr 1fr;
      }

      .panel {
        width: min(340px, calc(100vw - 20px));
        left: 10px;
        top: 10px;
      }

      .panel.collapsed {
        transform: translateX(calc(-100% - 18px));
      }

      .panel-toggle {
        right: -46px;
        top: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-heading">
        <div class="title">Tiling Arc Playground</div>
        <div class="subtitle">Choose a tiling and let random tiles rotate through their natural symmetry.</div>
      </div>
      <button id="togglePanel" class="panel-toggle" type="button" aria-label="Hide controls" title="Hide controls">⟨</button>
    </div>

    <div class="grid">
      <div>
        <label for="mode">Tiling</label>
        <select id="mode">
          <option value="square">Square</option>
          <option value="hex" selected>Hexagon</option>
          <option value="triangle">Triangle</option>
        </select>
      </div>

      <div>
        <label for="arcColor">Arc color</label>
        <select id="arcColor">
          <option value="#eaf1ff">Moonlight</option>
          <option value="#bde7d1">Seafoam</option>
          <option value="#d9c8ff">Lavender</option>
          <option value="#ffc857" selected>Rich yellow</option>
          <option value="#ffb3a7">Soft coral</option>
        </select>
      </div>

      <div>
        <label for="backgroundTheme">Background</label>
        <select id="backgroundTheme">
          <option value="dark" selected>Dark gradient</option>
          <option value="black">Black</option>
          <option value="white">White</option>
          <option value="slate">Slate blue</option>
          <option value="forest">Deep forest</option>
          <option value="plum">Muted plum</option>
        </select>
      </div>

      <div>
        <label for="size">Tile size</label>
        <input id="size" type="range" min="32" max="180" value="78" />
        <div class="value" id="sizeValue"></div>
      </div>

      <div>
        <label for="rate">Random turns / second</label>
        <input id="rate" type="range" min="0" max="12" step="0.1" value="2.3" />
        <div class="value" id="rateValue"></div>
      </div>

      <div>
        <label for="duration">Turn duration</label>
        <input id="duration" type="range" min="0.08" max="2.0" step="0.01" value="0.42" />
        <div class="value" id="durationValue"></div>
      </div>

      <div>
        <label for="lineWidth">Line width</label>
        <input id="lineWidth" type="range" min="1" max="12" step="0.1" value="3.2" />
        <div class="value" id="lineWidthValue"></div>
      </div>

      <div>
        <label for="outline">Outline opacity</label>
        <input id="outline" type="range" min="0" max="1" step="0.01" value="0.18" />
        <div class="value" id="outlineValue"></div>
      </div>

      <div class="row-full checkbox-row">
        <input id="showGrid" type="checkbox" checked />
        <label for="showGrid">Show tile outlines</label>
      </div>

      <div class="row-full buttons">
        <button id="randomize">Randomize</button>
        <button id="nudge">Rotate one tile</button>
        <button id="pause">Pause</button>
      </div>
    </div>

    <div class="footer">
      Hide the controls with the side handle. Keyboard: space pauses, enter rotates one tile, r randomizes, h hides controls.
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const controls = {
      panel: document.getElementById('panel'),
      togglePanel: document.getElementById('togglePanel'),
      mode: document.getElementById('mode'),
      arcColor: document.getElementById('arcColor'),
      backgroundTheme: document.getElementById('backgroundTheme'),
      size: document.getElementById('size'),
      rate: document.getElementById('rate'),
      duration: document.getElementById('duration'),
      lineWidth: document.getElementById('lineWidth'),
      outline: document.getElementById('outline'),
      showGrid: document.getElementById('showGrid'),
      randomize: document.getElementById('randomize'),
      nudge: document.getElementById('nudge'),
      pause: document.getElementById('pause'),
      sizeValue: document.getElementById('sizeValue'),
      rateValue: document.getElementById('rateValue'),
      durationValue: document.getElementById('durationValue'),
      lineWidthValue: document.getElementById('lineWidthValue'),
      outlineValue: document.getElementById('outlineValue'),
    };

    const palette = {
      grid: '#91a0bb',
      backgrounds: {
        dark: {
          type: 'radial',
          stops: ['#171c27', '#0f1218', '#090a0d']
        },
        black: {
          type: 'solid',
          color: '#000000'
        },
        white: {
          type: 'solid',
          color: '#ffffff'
        },
        slate: {
          type: 'radial',
          stops: ['#253247', '#161d2a', '#0f131b']
        },
        forest: {
          type: 'radial',
          stops: ['#1a2c25', '#0f1714', '#0a0d0b']
        },
        plum: {
          type: 'radial',
          stops: ['#30253a', '#1a1520', '#100d13']
        }
      }
    };

    const state = {
      width: window.innerWidth,
      height: window.innerHeight,
      mode: controls.mode.value,
      arcColor: controls.arcColor.value,
      backgroundTheme: controls.backgroundTheme.value,
      size: Number(controls.size.value),
      rate: Number(controls.rate.value),
      duration: Number(controls.duration.value),
      lineWidth: Number(controls.lineWidth.value),
      outline: Number(controls.outline.value),
      showGrid: controls.showGrid.checked,
      panelCollapsed: false,
      paused: false,
      tiles: [],
      lastTime: performance.now(),
    };

    function hexToRgba(hex, alpha) {
      const clean = hex.replace('#', '');
      const value = parseInt(clean, 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function updateLabels() {
      controls.sizeValue.textContent = `${Math.round(state.size)} px`;
      controls.rateValue.textContent = `${state.rate.toFixed(1)}`;
      controls.durationValue.textContent = `${state.duration.toFixed(2)} s`;
      controls.lineWidthValue.textContent = `${state.lineWidth.toFixed(1)} px`;
      controls.outlineValue.textContent = `${Math.round(state.outline * 100)}%`;
      controls.pause.textContent = state.paused ? 'Resume' : 'Pause';
      controls.togglePanel.textContent = state.panelCollapsed ? '⟩' : '⟨';
      controls.togglePanel.setAttribute('aria-label', state.panelCollapsed ? 'Show controls' : 'Hide controls');
      controls.togglePanel.title = state.panelCollapsed ? 'Show controls' : 'Hide controls';
      controls.panel.classList.toggle('collapsed', state.panelCollapsed);
    }

    function resize() {
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(state.width * dpr);
      canvas.height = Math.round(state.height * dpr);
      canvas.style.width = `${state.width}px`;
      canvas.style.height = `${state.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      rebuildTiles();
    }

    function centroid(verts) {
      let x = 0;
      let y = 0;
      for (const p of verts) {
        x += p.x;
        y += p.y;
      }
      return { x: x / verts.length, y: y / verts.length };
    }

    function midpoint(a, b) {
      return { x: 0.5 * (a.x + b.x), y: 0.5 * (a.y + b.y) };
    }

    function normalizeAngle(a) {
      while (a <= -Math.PI) a += 2 * Math.PI;
      while (a > Math.PI) a -= 2 * Math.PI;
      return a;
    }

    function selectedIndices(mode) {
      if (mode === 'square') return [0, 2];
      if (mode === 'hex') return [0, 2, 4];
      return [0];
    }

    function stepAngle(mode) {
      if (mode === 'square') return Math.PI / 2;
      if (mode === 'hex') return Math.PI / 3;
      return 2 * Math.PI / 3;
    }

    function squareVertices(cx, cy, s) {
      const h = s / 2;
      return [
        { x: cx - h, y: cy - h },
        { x: cx + h, y: cy - h },
        { x: cx + h, y: cy + h },
        { x: cx - h, y: cy + h },
      ];
    }

    function hexVertices(cx, cy, r) {
      const verts = [];
      for (let k = 0; k < 6; k++) {
        const a = -Math.PI / 2 + k * Math.PI / 3;
        verts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
      }
      return verts;
    }

    function triangleVertices(x, y, s, up) {
      const h = Math.sqrt(3) * s / 2;
      if (up) {
        return [
          { x: x + s / 2, y: y },
          { x: x + s, y: y + h },
          { x: x, y: y + h },
        ];
      }
      return [
        { x: x, y: y },
        { x: x + s, y: y },
        { x: x + s / 2, y: y + h },
      ];
    }

    function makeSquareTiles() {
      const s = state.size;
      const tiles = [];
      for (let y = -s; y < state.height + s * 2; y += s) {
        for (let x = -s; x < state.width + s * 2; x += s) {
          const verts = squareVertices(x + s / 2, y + s / 2, s);
          const c = centroid(verts);
          const step = stepAngle('square');
          const phase = Math.floor(Math.random() * 4) * step;
          tiles.push({ verts, center: c, angle: phase, target: phase, step });
        }
      }
      return tiles;
    }

    function makeHexTiles() {
      const r = state.size / 2;
      const dx = Math.sqrt(3) * r;
      const dy = 1.5 * r;
      const tiles = [];
      for (let row = -3; row < Math.ceil(state.height / dy) + 4; row++) {
        for (let col = -3; col < Math.ceil(state.width / dx) + 4; col++) {
          const cx = col * dx + (row % 2) * dx / 2;
          const cy = row * dy;
          const verts = hexVertices(cx, cy, r);
          const c = { x: cx, y: cy };
          const step = stepAngle('hex');
          const phase = Math.floor(Math.random() * 6) * step;
          tiles.push({ verts, center: c, angle: phase, target: phase, step });
        }
      }
      return tiles;
    }

    function makeTriangleTiles() {
      const s = state.size;
      const h = Math.sqrt(3) * s / 2;
      const tiles = [];
      for (let row = -2; row < Math.ceil(state.height / h) + 3; row++) {
        for (let col = -2; col < Math.ceil(state.width / (s / 2)) + 3; col++) {
          const x = col * (s / 2);
          const y = row * h;
          const up = ((row + col) % 2 === 0);
          const verts = triangleVertices(x, y, s, up);
          const c = centroid(verts);
          const step = stepAngle('triangle');
          const phase = Math.floor(Math.random() * 3) * step;
          tiles.push({ verts, center: c, angle: phase, target: phase, step });
        }
      }
      return tiles;
    }

    function rebuildTiles() {
      if (state.mode === 'square') state.tiles = makeSquareTiles();
      else if (state.mode === 'hex') state.tiles = makeHexTiles();
      else state.tiles = makeTriangleTiles();
    }

    function polygonPath(verts) {
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
      ctx.closePath();
    }

    function drawArcPolyline(center, p1, p2) {
      const r = Math.hypot(p1.x - center.x, p1.y - center.y);
      const a1 = Math.atan2(p1.y - center.y, p1.x - center.x);
      const a2 = Math.atan2(p2.y - center.y, p2.x - center.x);
      const delta = normalizeAngle(a2 - a1);
      const n = Math.max(24, Math.ceil(Math.abs(delta) * r / 5));

      for (let j = 0; j <= n; j++) {
        const t = j / n;
        const a = a1 + delta * t;
        const x = center.x + r * Math.cos(a);
        const y = center.y + r * Math.sin(a);
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
    }

    function drawMotif(verts) {
      const picks = selectedIndices(state.mode);
      ctx.beginPath();
      for (const i of picks) {
        const n = verts.length;
        const v = verts[i % n];
        const prev = verts[(i - 1 + n) % n];
        const next = verts[(i + 1) % n];
        const m1 = midpoint(prev, v);
        const m2 = midpoint(v, next);
        drawArcPolyline(v, m1, m2);
      }
      ctx.stroke();
    }

    function drawBackground() {
      const theme = palette.backgrounds[state.backgroundTheme] || palette.backgrounds.dark;

      if (theme.type === 'solid') {
        ctx.fillStyle = theme.color;
        ctx.fillRect(0, 0, state.width, state.height);
        return;
      }

      const grad = ctx.createRadialGradient(
        state.width * 0.30, state.height * 0.25, 40,
        state.width * 0.30, state.height * 0.25, Math.max(state.width, state.height)
      );
      grad.addColorStop(0, theme.stops[0]);
      grad.addColorStop(0.45, theme.stops[1]);
      grad.addColorStop(1, theme.stops[2]);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function drawTiles() {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const onLight = state.backgroundTheme === 'white';
      const shadowColor = onLight ? hexToRgba(state.arcColor, 0.08) : hexToRgba(state.arcColor, 0.14);

      for (const tile of state.tiles) {
        const { verts, center, angle } = tile;

        ctx.save();
        polygonPath(verts);
        ctx.clip();

        ctx.translate(center.x, center.y);
        ctx.rotate(angle);
        ctx.translate(-center.x, -center.y);

        ctx.strokeStyle = shadowColor;
        ctx.lineWidth = state.lineWidth + 5;
        drawMotif(verts);

        ctx.strokeStyle = state.arcColor;
        ctx.lineWidth = state.lineWidth;
        drawMotif(verts);

        ctx.restore();

        if (state.showGrid && state.outline > 0) {
          polygonPath(verts);
          ctx.strokeStyle = onLight
            ? `rgba(70, 82, 100, ${state.outline})`
            : `rgba(145, 160, 187, ${state.outline})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    function randomTurn() {
      if (!state.tiles.length) return;
      const tile = state.tiles[(Math.random() * state.tiles.length) | 0];
      tile.target += tile.step;
    }

    function randomize() {
      rebuildTiles();
    }

    function update(dt) {
      if (!state.paused && state.rate > 0) {
        let expected = state.rate * dt;
        while (expected > 1) {
          randomTurn();
          expected -= 1;
        }
        if (Math.random() < expected) randomTurn();
      }

      const baseStep = stepAngle(state.mode);
      const angularSpeed = baseStep / Math.max(0.01, state.duration);

      for (const tile of state.tiles) {
        const diff = tile.target - tile.angle;
        if (Math.abs(diff) < 1e-5) {
          tile.angle = tile.target;
          continue;
        }
        const step = angularSpeed * dt;
        if (diff > 0) tile.angle = Math.min(tile.angle + step, tile.target);
        else tile.angle = Math.max(tile.angle - step, tile.target);
      }
    }

    function draw() {
      drawBackground();
      drawTiles();
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - state.lastTime) / 1000);
      state.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }

    function syncStateFromControls(rebuild = false) {
      state.mode = controls.mode.value;
      state.arcColor = controls.arcColor.value;
      state.backgroundTheme = controls.backgroundTheme.value;
      state.size = Number(controls.size.value);
      state.rate = Number(controls.rate.value);
      state.duration = Number(controls.duration.value);
      state.lineWidth = Number(controls.lineWidth.value);
      state.outline = Number(controls.outline.value);
      state.showGrid = controls.showGrid.checked;
      updateLabels();
      if (rebuild) rebuildTiles();
    }

    controls.mode.addEventListener('change', () => syncStateFromControls(true));
    controls.arcColor.addEventListener('change', () => syncStateFromControls(false));
    controls.backgroundTheme.addEventListener('change', () => syncStateFromControls(false));
    controls.size.addEventListener('input', () => syncStateFromControls(true));
    controls.rate.addEventListener('input', () => syncStateFromControls(false));
    controls.duration.addEventListener('input', () => syncStateFromControls(false));
    controls.lineWidth.addEventListener('input', () => syncStateFromControls(false));
    controls.outline.addEventListener('input', () => syncStateFromControls(false));
    controls.showGrid.addEventListener('change', () => syncStateFromControls(false));
    controls.randomize.addEventListener('click', randomize);
    controls.nudge.addEventListener('click', randomTurn);
    controls.pause.addEventListener('click', () => {
      state.paused = !state.paused;
      updateLabels();
    });
    controls.togglePanel.addEventListener('click', () => {
      state.panelCollapsed = !state.panelCollapsed;
      updateLabels();
    });

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', (event) => {
      if (event.key === ' ') {
        event.preventDefault();
        state.paused = !state.paused;
        updateLabels();
      } else if (event.key.toLowerCase() === 'r') {
        randomize();
      } else if (event.key === 'Enter') {
        randomTurn();
      } else if (event.key.toLowerCase() === 'h') {
        state.panelCollapsed = !state.panelCollapsed;
        updateLabels();
      }
    });

    syncStateFromControls(true);
    resize();
    updateLabels();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
