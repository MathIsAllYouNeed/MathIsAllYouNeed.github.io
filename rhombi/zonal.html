<script>
// â”€â”€ Constants (from zonal-config.js) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const S = CONFIG.S;
const E = [
  { x: -0.866 * S, y: -0.5 * S },
  { x:  0,         y: -1   * S },
  { x:  0.866 * S, y: -0.5 * S },
];

const VERTEX_R = CONFIG.VERTEX_R;
const PATH_W = CONFIG.PATH_W;
const EDGE_COLOR = CONFIG.EDGE_COLOR;
const EDGE_W = CONFIG.EDGE_W;
const DIAG_COLOR = CONFIG.DIAG_COLOR;
const DIAG_W = CONFIG.DIAG_W;
const BOUNDARY_COLOR = CONFIG.BOUNDARY_COLOR;
const BOUNDARY_W = CONFIG.BOUNDARY_W;
const POS_COLOR = CONFIG.POS_COLOR;
const NEG_COLOR = CONFIG.NEG_COLOR;
const PATH_COLOR = CONFIG.PATH_COLOR;
const KAPPA = 0.5522847498;
const B62 = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
const COPY_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;

const STRATEGY_NAMES = [
  "uniform", "bias-left", "bias-right", "gaussian",
  "freq-balance", "freq-reinforce", "state-balance", "state-reinforce",
  "pair-balance", "pair-reinforce", "leftmost", "rightmost",
  "momentum", "round-robin",
];
const STRATEGY_LABELS = {
  "uniform": "Uniform random",
  "bias-left": "Bias left",
  "bias-right": "Bias right",
  "gaussian": "Gaussian",
  "freq-balance": "Freq balance",
  "freq-reinforce": "Freq reinforce",
  "state-balance": "State balance",
  "state-reinforce": "State reinforce",
  "pair-balance": "Pair balance",
  "pair-reinforce": "Pair reinforce",
  "leftmost": "Leftmost",
  "rightmost": "Rightmost",
  "momentum": "Momentum",
  "round-robin": "Round-robin",
};

function mixedRadixEncode(choices, bases) {
  let value = 0n;
  for (let i = choices.length - 1; i >= 0; i--)
    value = value * BigInt(bases[i]) + BigInt(choices[i]);
  if (value === 0n) return "A";
  let result = "";
  while (value > 0n) {
    result = B62[Number(value % 62n)] + result;
    value /= 62n;
  }
  return result;
}

function bigIntToB62(value) {
  if (value === 0n) return "A";
  let result = "";
  while (value > 0n) {
    result = B62[Number(value % 62n)] + result;
    value /= 62n;
  }
  return result;
}

// â”€â”€ Tiling generation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function findAscents(state) {
  const asc = [];
  for (let i = 0; i < state.length - 1; i++)
    if (state[i] < state[i + 1]) asc.push(i);
  return asc;
}

function makeState(n) {
  const s = [];
  for (let d = 0; d < 3; d++) for (let i = 0; i < n; i++) s.push(d);
  return s;
}

function weightedPick(ascents, weights) {
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < ascents.length; i++) {
    r -= weights[i];
    if (r <= 0) return i;
  }
  return ascents.length - 1;
}

function makeStrategy(name) {
  switch (name) {
    case "uniform":
      return { pick(a) { return Math.floor(Math.random() * a.length); }, reset() {} };
    case "bias-left":
      return { pick(a) { return weightedPick(a, a.map((_, i) => a.length - i)); }, reset() {} };
    case "bias-right":
      return { pick(a) { return weightedPick(a, a.map((_, i) => i + 1)); }, reset() {} };
    case "gaussian":
      return {
        pick(a, s) {
          const m = (s.length - 1) / 2, sig = s.length / 4;
          return weightedPick(a, a.map(idx => Math.exp(-0.5 * ((idx - m) / sig) ** 2)));
        }, reset() {} };
    case "freq-balance": {
      let f = {};
      return {
        pick(a) { const w = a.map(i => 1/(1+(f[i]||0))); const c = weightedPick(a,w); f[a[c]]=(f[a[c]]||0)+1; return c; },
        reset() { f = {}; } };
    }
    case "freq-reinforce": {
      let f = {};
      return {
        pick(a) { const w = a.map(i => 1+(f[i]||0)); const c = weightedPick(a,w); f[a[c]]=(f[a[c]]||0)+1; return c; },
        reset() { f = {}; } };
    }
    case "state-balance": {
      let v = {};
      return {
        pick(a, s) { const w = a.map(i => 1/(1+(v[s[i]]||0))); const c = weightedPick(a,w); v[s[a[c]]]=(v[s[a[c]]]||0)+1; return c; },
        reset() { v = {}; } };
    }
    case "state-reinforce": {
      let v = {};
      return {
        pick(a, s) { const w = a.map(i => 1+(v[s[i]]||0)); const c = weightedPick(a,w); v[s[a[c]]]=(v[s[a[c]]]||0)+1; return c; },
        reset() { v = {}; } };
    }
    case "pair-balance": {
      let p = {};
      return {
        pick(a, s) { const w = a.map(i => { const k=s[i]+","+s[i+1]; return 1/(1+(p[k]||0)); }); const c = weightedPick(a,w); const k=s[a[c]]+","+s[a[c]+1]; p[k]=(p[k]||0)+1; return c; },
        reset() { p = {}; } };
    }
    case "pair-reinforce": {
      let p = {};
      return {
        pick(a, s) { const w = a.map(i => { const k=s[i]+","+s[i+1]; return 1+(p[k]||0); }); const c = weightedPick(a,w); const k=s[a[c]]+","+s[a[c]+1]; p[k]=(p[k]||0)+1; return c; },
        reset() { p = {}; } };
    }
    case "leftmost":
      return { pick() { return 0; }, reset() {} };
    case "rightmost":
      return { pick(a) { return a.length - 1; }, reset() {} };
    case "momentum": {
      let last = -1;
      return {
        pick(a) {
          if (last < 0) { const c = Math.floor(Math.random()*a.length); last=a[c]; return c; }
          const w = a.map(i => 1/(1+Math.abs(i-last))); const c = weightedPick(a,w); last=a[c]; return c;
        }, reset() { last = -1; } };
    }
    case "round-robin": {
      const pt = [[0,1],[0,2],[1,2]]; let ph = 0;
      return {
        pick(a, s) {
          for (let at = 0; at < 3; at++) {
            const [pa,pb] = pt[(ph+at)%3];
            const m = []; for (let j=0;j<a.length;j++) if(s[a[j]]===pa&&s[a[j]+1]===pb) m.push(j);
            if (m.length) { ph=(ph+at+1)%3; return m[Math.floor(Math.random()*m.length)]; }
          }
          ph=(ph+1)%3; return Math.floor(Math.random()*a.length);
        }, reset() { ph = 0; } };
    }
    default: return makeStrategy("uniform");
  }
}

function generateTiling(n, strategyName) {
  const strategy = makeStrategy(strategyName);
  strategy.reset();
  const state = makeState(n);
  const choices = [], bases = [];
  const rhombi = [];
  let ascents = findAscents(state);
  while (ascents.length > 0) {
    const ci = strategy.pick(ascents, state);
    choices.push(ci);
    bases.push(ascents.length);
    const idx = ascents[ci];
    let px = 0, py = 0;
    for (let k = 0; k < idx; k++) { px += E[state[k]].x; py += E[state[k]].y; }
    rhombi.push({ px, py, a: state[idx], b: state[idx + 1] });
    const tmp = state[idx]; state[idx] = state[idx + 1]; state[idx + 1] = tmp;
    ascents = findAscents(state);
  }
  return { rhombi, code: mixedRadixEncode(choices, bases) };
}

function orderedVertexKeys(vertexMap) {
  return [...vertexMap.entries()]
    .sort((a, b) => a[1].x - b[1].x || a[1].y - b[1].y || a[0].localeCompare(b[0]))
    .map(([key]) => key);
}

function encodeBits(bits) {
  let value = 0n;
  for (const bit of bits)
    value = (value << 1n) | BigInt(bit ? 1 : 0);
  return bigIntToB62(value);
}

function encodeSigns(vertexMap) {
  return encodeBits(orderedVertexKeys(vertexMap).map(key => vertexMap.get(key).sign === 1 ? 1 : 0));
}

function encodeDiagonals(hasDiag) {
  return encodeBits(hasDiag.map(flag => flag ? 1 : 0));
}

// â”€â”€ Geometry helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function vKey(v) { return `${Math.round(v.x * 100)},${Math.round(v.y * 100)}`; }
function eKey(a, b) { const ka = vKey(a), kb = vKey(b); return ka < kb ? ka + "|" + kb : kb + "|" + ka; }

function collectVerticesAndEdges(rhombi) {
  const vertexMap = new Map();
  const edges = new Map();
  for (const r of rhombi) {
    const v0 = { x: r.px, y: r.py };
    const v1 = { x: r.px + E[r.a].x, y: r.py + E[r.a].y };
    const v2 = { x: r.px + E[r.a].x + E[r.b].x, y: r.py + E[r.a].y + E[r.b].y };
    const v3 = { x: r.px + E[r.b].x, y: r.py + E[r.b].y };
    for (const v of [v0, v1, v2, v3]) {
      const k = vKey(v);
      if (!vertexMap.has(k)) vertexMap.set(k, { x: v.x, y: v.y, sign: 0 });
    }
    for (const [a, b] of [[v0,v1],[v1,v2],[v2,v3],[v3,v0]]) {
      const ek = eKey(a, b);
      if (!edges.has(ek)) edges.set(ek, [a, b]);
    }
  }
  return { vertexMap, edges };
}

function assignSigns(vertexMap) {
  for (const [, v] of vertexMap) v.sign = Math.random() < 0.5 ? 1 : -1;
}

// â”€â”€ Union-Find â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

class UnionFind {
  constructor() { this.p = new Map(); this.r = new Map(); }
  find(x) {
    if (!this.p.has(x)) { this.p.set(x, x); this.r.set(x, 0); }
    if (this.p.get(x) !== x) this.p.set(x, this.find(this.p.get(x)));
    return this.p.get(x);
  }
  union(a, b) {
    const ra = this.find(a), rb = this.find(b);
    if (ra === rb) return;
    const ka = this.r.get(ra), kb = this.r.get(rb);
    if (ka < kb) this.p.set(ra, rb);
    else if (ka > kb) this.p.set(rb, ra);
    else { this.p.set(rb, ra); this.r.set(ra, ka + 1); }
  }
}

// â”€â”€ Inferno colormap â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

const INFERNO = [
  [0.0, 0, 0, 4],     [0.1, 11, 4, 30],    [0.2, 43, 10, 72],
  [0.3, 78, 18, 83],   [0.4, 115, 31, 78],  [0.5, 152, 47, 60],
  [0.6, 186, 68, 38],  [0.7, 215, 97, 18],  [0.8, 238, 138, 8],
  [0.9, 252, 192, 30], [1.0, 252, 255, 164],
];

function infernoColor(t) {
  t = Math.max(0, Math.min(1, t));
  for (let i = 0; i < INFERNO.length - 1; i++) {
    const [t0, r0, g0, b0] = INFERNO[i];
    const [t1, r1, g1, b1] = INFERNO[i + 1];
    if (t <= t1) {
      const f = (t - t0) / (t1 - t0);
      return `rgb(${Math.round(r0+f*(r1-r0))},${Math.round(g0+f*(g1-g0))},${Math.round(b0+f*(b1-b0))})`;
    }
  }
  return `rgb(252,255,164)`;
}

// â”€â”€ Region computation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function getBoundaryKeys(n) {
  const keys = new Set();
  let p = { x: 0, y: 0 };
  keys.add(vKey(p));
  for (let d = 0; d < 3; d++)
    for (let i = 0; i < n; i++) {
      p = { x: p.x + E[d].x, y: p.y + E[d].y };
      keys.add(vKey(p));
    }
  for (let d = 0; d < 3; d++)
    for (let i = 0; i < n; i++) {
      p = { x: p.x - E[d].x, y: p.y - E[d].y };
      keys.add(vKey(p));
    }
  return keys;
}

function localGroups(isMixed, hasDiag) {
  const mixedCount = isMixed.filter(Boolean).length;
  const sideVerts = [[0,1],[1,2],[2,3],[3,0]];
  if (mixedCount === 0) return [[0, 1, 2, 3]];
  if (mixedCount === 2) {
    const mi = isMixed.map((m, i) => m ? i : -1).filter(i => i >= 0);
    const [a, b] = mi;
    const diff = (b - a + 4) % 4;
    if (diff === 1 || diff === 3) {
      const sa = new Set(sideVerts[a]);
      const shared = sideVerts[b].find(vi => sa.has(vi));
      return [[shared], [0,1,2,3].filter(i => i !== shared)];
    }
    if (a === 0 && b === 2) return [[0, 3], [1, 2]];
    return [[0, 1], [2, 3]];
  }
  if (mixedCount === 4) {
    if (hasDiag) return [[1], [3], [0, 2]];
    return [[0], [1], [2], [3]];
  }
  return [[0, 1, 2, 3]];
}

function computeRegionColors(rhombi, hasDiag, vertexMap, n, unboundedMode) {
  const uf = new UnionFind();
  const sideVerts = [[0,1],[1,2],[2,3],[3,0]];

  for (let ri = 0; ri < rhombi.length; ri++) {
    const r = rhombi[ri];
    const v = [
      { x: r.px, y: r.py },
      { x: r.px + E[r.a].x, y: r.py + E[r.a].y },
      { x: r.px + E[r.a].x + E[r.b].x, y: r.py + E[r.a].y + E[r.b].y },
      { x: r.px + E[r.b].x, y: r.py + E[r.b].y },
    ];
    const keys = v.map(vv => vKey(vv));
    const isMixed = sideVerts.map(([i,j]) =>
      vertexMap.get(keys[i]).sign !== vertexMap.get(keys[j]).sign
    );
    for (const group of localGroups(isMixed, hasDiag[ri])) {
      for (let i = 1; i < group.length; i++)
        uf.union(keys[group[0]], keys[group[i]]);
    }
  }

  const boundaryKeys = getBoundaryKeys(n);
  const regionSize = new Map();
  const regionUnbounded = new Set();

  for (const [key] of vertexMap) {
    const root = uf.find(key);
    regionSize.set(root, (regionSize.get(root) || 0) + 1);
    if (boundaryKeys.has(key)) regionUnbounded.add(root);
  }

  // Bounded region color scaling
  const bounded = [];
  for (const [root, size] of regionSize) {
    if (!regionUnbounded.has(root)) bounded.push(size);
  }
  const maxS = bounded.length ? Math.max(...bounded) : 1;
  const minS = bounded.length ? Math.min(...bounded) : 1;
  const logMax = Math.log(maxS), logMin = Math.log(minS);

  // Unbounded region coloring
  let unboundedColorMap = new Map(); // root -> color
  if (unboundedMode === "inferno-dark") {
    // Use dark end of inferno, scaled by size (larger = darker)
    const ubSizes = [];
    for (const root of regionUnbounded) ubSizes.push(regionSize.get(root));
    const ubMax = ubSizes.length ? Math.max(...ubSizes) : 1;
    const ubMin = ubSizes.length ? Math.min(...ubSizes) : 1;
    const ubLogMax = Math.log(ubMax), ubLogMin = Math.log(ubMin);
    for (const root of regionUnbounded) {
      const size = regionSize.get(root);
      // Map to t in [0, 0.35] â€” dark end of inferno; smaller = brighter within that range
      const t = ubLogMax === ubLogMin ? 0.15
        : 0.35 * (1 - (Math.log(size) - ubLogMin) / (ubLogMax - ubLogMin));
      unboundedColorMap.set(root, infernoColor(t));
    }
  } else if (unboundedMode === "boundary-hue") {
    // Color by which boundary segment the region touches, using distinct hues
    const bKeys = getBoundaryKeysList(n);
    // For each boundary vertex, find its region root
    const rootToBoundaryIdx = new Map();
    for (let i = 0; i < bKeys.length; i++) {
      const root = uf.find(bKeys[i]);
      if (!rootToBoundaryIdx.has(root)) rootToBoundaryIdx.set(root, []);
      rootToBoundaryIdx.get(root).push(i);
    }
    const ubRoots = [...regionUnbounded];
    // Assign color based on average boundary position (angle around hexagon)
    for (const root of ubRoots) {
      const indices = rootToBoundaryIdx.get(root) || [0];
      const avgIdx = indices.reduce((a, b) => a + b, 0) / indices.length;
      const hue = (avgIdx / bKeys.length) * 360;
      unboundedColorMap.set(root, `hsl(${hue}, 55%, 75%)`);
    }
  } else if (unboundedMode === "boundary-length") {
    // Color by how many boundary vertices the region contains
    const bKeys = getBoundaryKeysList(n);
    const rootBoundaryCount = new Map();
    for (const bk of bKeys) {
      const root = uf.find(bk);
      rootBoundaryCount.set(root, (rootBoundaryCount.get(root) || 0) + 1);
    }
    const counts = [...regionUnbounded].map(r => rootBoundaryCount.get(r) || 0);
    const cMax = counts.length ? Math.max(...counts) : 1;
    const cMin = counts.length ? Math.min(...counts) : 1;
    for (const root of regionUnbounded) {
      const c = rootBoundaryCount.get(root) || 0;
      // More boundary contact = cooler (blue), less = warmer (orange)
      const t = cMax === cMin ? 0.5 : (c - cMin) / (cMax - cMin);
      const hue = 30 + (1 - t) * 0 + t * 210; // 30 (orange) to 240 (blue)
      const light = 70 + (1 - t) * 10; // slightly brighter for small contact
      unboundedColorMap.set(root, `hsl(${hue}, 50%, ${light}%)`);
    }
  }

  const colorMap = new Map();
  for (const [key] of vertexMap) {
    const root = uf.find(key);
    if (regionUnbounded.has(root)) {
      colorMap.set(key, unboundedColorMap.get(root) || null);
      continue;
    }
    const size = regionSize.get(root);
    const t = logMax === logMin ? 0.7 : 1 - (Math.log(size) - logMin) / (logMax - logMin);
    colorMap.set(key, infernoColor(t));
  }
  return colorMap;
}

// Ordered list of boundary vertex keys (for boundary-hue and boundary-length modes)
function getBoundaryKeysList(n) {
  const keys = [];
  let p = { x: 0, y: 0 };
  keys.push(vKey(p));
  for (let d = 0; d < 3; d++)
    for (let i = 0; i < n; i++) {
      p = { x: p.x + E[d].x, y: p.y + E[d].y };
      keys.push(vKey(p));
    }
  for (let d = 0; d < 3; d++)
    for (let i = 0; i < n; i++) {
      p = { x: p.x - E[d].x, y: p.y - E[d].y };
      keys.push(vKey(p));
    }
  return keys;
}

// â”€â”€ Region fill drawing â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function drawAllFills(rhombi, hasDiag, vertexMap, regionColors) {
  const sideVerts = [[0,1],[1,2],[2,3],[3,0]];

  function fillShape(d, color) {
    if (!color) return;
    const el = document.createElementNS(NS, "path");
    el.setAttribute("d", d);
    el.setAttribute("fill", color);
    el.setAttribute("stroke", "none");
    renderLayer.appendChild(el);
  }

  function arcCP(m1, m2, sv) {
    return {
      cp1: { x: m1.x + KAPPA*(m2.x-sv.x), y: m1.y + KAPPA*(m2.y-sv.y) },
      cp2: { x: m2.x + KAPPA*(m1.x-sv.x), y: m2.y + KAPPA*(m1.y-sv.y) },
    };
  }

  for (let ri = 0; ri < rhombi.length; ri++) {
    const r = rhombi[ri];
    const v = [
      { x: r.px, y: r.py },
      { x: r.px + E[r.a].x, y: r.py + E[r.a].y },
      { x: r.px + E[r.a].x + E[r.b].x, y: r.py + E[r.a].y + E[r.b].y },
      { x: r.px + E[r.b].x, y: r.py + E[r.b].y },
    ];
    const keys = v.map(vv => vKey(vv));
    const col = k => regionColors.get(k) || null;
    const mid = sideVerts.map(([i,j]) => ({
      x: (v[i].x + v[j].x) / 2, y: (v[i].y + v[j].y) / 2
    }));
    const isMixed = sideVerts.map(([i,j]) =>
      vertexMap.get(keys[i]).sign !== vertexMap.get(keys[j]).sign
    );
    const mc = isMixed.filter(Boolean).length;

    if (mc === 0) {
      fillShape(
        `M${v[0].x},${v[0].y}L${v[1].x},${v[1].y}L${v[2].x},${v[2].y}L${v[3].x},${v[3].y}Z`,
        col(keys[0])
      );
      continue;
    }

    if (mc === 2) {
      const mi = isMixed.map((m, i) => m ? i : -1).filter(i => i >= 0);
      const [a, b] = mi;
      const diff = (b - a + 4) % 4;

      if (diff === 1 || diff === 3) {
        // Adjacent: arc at shared vertex s
        const sa = new Set(sideVerts[a]);
        const s = sideVerts[b].find(vi => sa.has(vi));
        const mB = mid[(s+3)%4], mA = mid[s];
        const { cp1, cp2 } = arcCP(mB, mA, v[s]);
        const s1 = (s+1)%4, s2 = (s+2)%4, s3 = (s+3)%4;

        // Small region near s
        fillShape(
          `M${mB.x},${mB.y}L${v[s].x},${v[s].y}L${mA.x},${mA.y}` +
          `C${cp2.x},${cp2.y} ${cp1.x},${cp1.y} ${mB.x},${mB.y}Z`,
          col(keys[s])
        );
        // Large region
        fillShape(
          `M${mB.x},${mB.y}C${cp1.x},${cp1.y} ${cp2.x},${cp2.y} ${mA.x},${mA.y}` +
          `L${v[s1].x},${v[s1].y}L${v[s2].x},${v[s2].y}L${v[s3].x},${v[s3].y}Z`,
          col(keys[s1])
        );
      } else {
        // Opposite: straight segment
        let side1, side2;
        if (a === 0 && b === 2) { side1 = [0, 3]; side2 = [1, 2]; }
        else { side1 = [1, 0]; side2 = [2, 3]; }
        const mA = mid[a], mB = mid[b];
        fillShape(
          `M${mA.x},${mA.y}L${v[side1[0]].x},${v[side1[0]].y}L${v[side1[1]].x},${v[side1[1]].y}L${mB.x},${mB.y}Z`,
          col(keys[side1[0]])
        );
        fillShape(
          `M${mA.x},${mA.y}L${v[side2[0]].x},${v[side2[0]].y}L${v[side2[1]].x},${v[side2[1]].y}L${mB.x},${mB.y}Z`,
          col(keys[side2[0]])
        );
      }
      continue;
    }

    if (mc === 4) {
      if (hasDiag[ri]) {
        // Arcs at v1 and v3
        const { cp1: c1a, cp2: c2a } = arcCP(mid[0], mid[1], v[1]);
        const { cp1: c1b, cp2: c2b } = arcCP(mid[2], mid[3], v[3]);
        // Near v1
        fillShape(
          `M${mid[0].x},${mid[0].y}L${v[1].x},${v[1].y}L${mid[1].x},${mid[1].y}` +
          `C${c2a.x},${c2a.y} ${c1a.x},${c1a.y} ${mid[0].x},${mid[0].y}Z`,
          col(keys[1])
        );
        // Near v3
        fillShape(
          `M${mid[2].x},${mid[2].y}L${v[3].x},${v[3].y}L${mid[3].x},${mid[3].y}` +
          `C${c2b.x},${c2b.y} ${c1b.x},${c1b.y} ${mid[2].x},${mid[2].y}Z`,
          col(keys[3])
        );
        // Central (v0, v2)
        fillShape(
          `M${mid[0].x},${mid[0].y}` +
          `C${c1a.x},${c1a.y} ${c2a.x},${c2a.y} ${mid[1].x},${mid[1].y}` +
          `L${v[2].x},${v[2].y}L${mid[2].x},${mid[2].y}` +
          `C${c1b.x},${c1b.y} ${c2b.x},${c2b.y} ${mid[3].x},${mid[3].y}` +
          `L${v[0].x},${v[0].y}Z`,
          col(keys[0])
        );
      } else {
        // Crossing segments
        const cx = (v[0].x+v[1].x+v[2].x+v[3].x)/4;
        const cy = (v[0].y+v[1].y+v[2].y+v[3].y)/4;
        for (let i = 0; i < 4; i++) {
          const mP = mid[(i+3)%4], mN = mid[i];
          fillShape(
            `M${mP.x},${mP.y}L${v[i].x},${v[i].y}L${mN.x},${mN.y}L${cx},${cy}Z`,
            col(keys[i])
          );
        }
      }
    }
  }
}

// â”€â”€ Build path segments (arcs + straight lines) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function buildPathSegments(rhombi, hasDiag, vertexMap) {
  const segmentsByEdge = new Map();
  const allMixedEdges = new Set();
  const diagonalEdges = [];

  function addSeg(e1, e2, bezier) {
    allMixedEdges.add(e1);
    allMixedEdges.add(e2);
    if (!segmentsByEdge.has(e1)) segmentsByEdge.set(e1, []);
    segmentsByEdge.get(e1).push({ target: e2, bezier });
    if (!segmentsByEdge.has(e2)) segmentsByEdge.set(e2, []);
    segmentsByEdge.get(e2).push({ target: e1, bezier: [bezier[3], bezier[2], bezier[1], bezier[0]] });
  }

  function arcBezier(m1, m2, sv) {
    const cp1 = { x: m1.x + KAPPA * (m2.x - sv.x), y: m1.y + KAPPA * (m2.y - sv.y) };
    const cp2 = { x: m2.x + KAPPA * (m1.x - sv.x), y: m2.y + KAPPA * (m1.y - sv.y) };
    return [m1, cp1, cp2, m2];
  }

  function lineBezier(m1, m2) {
    const cp1 = { x: m1.x + (m2.x - m1.x) / 3, y: m1.y + (m2.y - m1.y) / 3 };
    const cp2 = { x: m1.x + 2 * (m2.x - m1.x) / 3, y: m1.y + 2 * (m2.y - m1.y) / 3 };
    return [m1, cp1, cp2, m2];
  }

  // Side indices: 0=(v0,v1), 1=(v1,v2), 2=(v2,v3), 3=(v3,v0)
  const sideVerts = [[0,1],[1,2],[2,3],[3,0]];

  for (let ri = 0; ri < rhombi.length; ri++) {
    const r = rhombi[ri];
    const v = [
      { x: r.px, y: r.py },
      { x: r.px + E[r.a].x, y: r.py + E[r.a].y },
      { x: r.px + E[r.a].x + E[r.b].x, y: r.py + E[r.a].y + E[r.b].y },
      { x: r.px + E[r.b].x, y: r.py + E[r.b].y },
    ];

    if (hasDiag[ri]) diagonalEdges.push([v[0], v[2]]);

    const isMixed = sideVerts.map(([i, j]) =>
      vertexMap.get(vKey(v[i])).sign !== vertexMap.get(vKey(v[j])).sign
    );
    const mixedCount = isMixed.filter(Boolean).length;
    if (mixedCount === 0) continue;

    const ek = sideVerts.map(([i, j]) => eKey(v[i], v[j]));
    const mid = sideVerts.map(([i, j]) => ({ x: (v[i].x + v[j].x) / 2, y: (v[i].y + v[j].y) / 2 }));

    if (mixedCount === 2) {
      const mi = isMixed.map((m, i) => m ? i : -1).filter(i => i >= 0);
      const [a, b] = mi;
      const diff = (b - a + 4) % 4;
      if (diff === 1 || diff === 3) {
        // Adjacent: arc at shared vertex
        const sa = new Set(sideVerts[a]);
        const shared = sideVerts[b].find(vi => sa.has(vi));
        addSeg(ek[a], ek[b], arcBezier(mid[a], mid[b], v[shared]));
      } else {
        // Opposite: straight segment
        addSeg(ek[a], ek[b], lineBezier(mid[a], mid[b]));
      }
    } else if (mixedCount === 4) {
      if (hasDiag[ri]) {
        // Diagonal v0-v2: arcs at v1 (sides 0,1) and v3 (sides 2,3)
        addSeg(ek[0], ek[1], arcBezier(mid[0], mid[1], v[1]));
        addSeg(ek[2], ek[3], arcBezier(mid[2], mid[3], v[3]));
      } else {
        // No diagonal: crossing straight segments between opposite sides
        addSeg(ek[0], ek[2], lineBezier(mid[0], mid[2]));
        addSeg(ek[1], ek[3], lineBezier(mid[1], mid[3]));
      }
    }
  }

  return { segmentsByEdge, allMixedEdges, diagonalEdges };
}

// â”€â”€ Path tracing â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function tracePaths(segmentsByEdge, allMixedEdges) {
  const visited = new Set();
  const paths = [];

  const endpoints = [];
  for (const ek of allMixedEdges) {
    const segs = segmentsByEdge.get(ek);
    if (!segs || segs.length <= 1) endpoints.push(ek);
  }

  function trace(startEdge) {
    const beziers = [];
    let cur = startEdge;
    visited.add(cur);

    while (true) {
      const segs = segmentsByEdge.get(cur) || [];
      const seg = segs.find(s => !visited.has(s.target));
      if (!seg) {
        const closeSeg = segs.find(s => s.target === startEdge && beziers.length > 0);
        if (closeSeg) {
          beziers.push(closeSeg.bezier);
          return { beziers, closed: true };
        }
        return { beziers, closed: false };
      }
      beziers.push(seg.bezier);
      cur = seg.target;
      visited.add(cur);
    }
  }

  for (const ep of endpoints) {
    if (visited.has(ep)) continue;
    const path = trace(ep);
    if (path.beziers.length > 0) paths.push(path);
  }

  for (const ek of allMixedEdges) {
    if (visited.has(ek)) continue;
    const path = trace(ek);
    if (path.beziers.length > 0) paths.push(path);
  }

  return paths;
}

function pathToSVGd(beziers) {
  if (beziers.length === 0) return "";
  const [p0, p1, p2, p3] = beziers[0];
  let d = `M${p0.x},${p0.y}C${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`;
  for (let i = 1; i < beziers.length; i++) {
    const [, c1, c2, end] = beziers[i];
    d += `C${c1.x},${c1.y} ${c2.x},${c2.y} ${end.x},${end.y}`;
  }
  return d;
}

// â”€â”€ SVG helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

const svgEl = document.getElementById("canvas");
const NS = "http://www.w3.org/2000/svg";
const permalinkText = document.getElementById("permalink-text");
const copyLinkBtn = document.getElementById("btn-copy-link");
let renderLayer = null;

copyLinkBtn.innerHTML = COPY_ICON;

function addLine(x1, y1, x2, y2, color, width) {
  const el = document.createElementNS(NS, "line");
  el.setAttribute("x1", x1); el.setAttribute("y1", y1);
  el.setAttribute("x2", x2); el.setAttribute("y2", y2);
  el.setAttribute("stroke", color);
  el.setAttribute("stroke-width", width);
  renderLayer.appendChild(el);
}

function addCircle(cx, cy, r, fill) {
  const el = document.createElementNS(NS, "circle");
  el.setAttribute("cx", cx); el.setAttribute("cy", cy);
  el.setAttribute("r", r); el.setAttribute("fill", fill);
  renderLayer.appendChild(el);
}

function addPath(d, color, width) {
  const el = document.createElementNS(NS, "path");
  el.setAttribute("d", d);
  el.setAttribute("stroke", color);
  el.setAttribute("stroke-width", width);
  el.setAttribute("fill", "none");
  el.setAttribute("stroke-linecap", "round");
  el.setAttribute("stroke-linejoin", "round");
  renderLayer.appendChild(el);
}

function makeRenderLayer(n) {
  const el = document.createElementNS(NS, "g");
  el.setAttribute("transform", `translate(0 ${-2 * n * S}) rotate(180)`);
  return el;
}

// â”€â”€ State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

let currentN, currentRhombi, currentVertexMap, currentEdgeMap, currentHasDiag, currentCode;

function buildPermalink() {
  const url = new URL("zonal-view.html", window.location.href);
  url.searchParams.set("n", currentN);
  url.searchParams.set("c", currentCode);
  url.searchParams.set("d", encodeDiagonals(currentHasDiag));
  url.searchParams.set("s", encodeSigns(currentVertexMap));
  return url.toString();
}

function updatePermalink() {
  if (!currentRhombi || !currentVertexMap || !currentHasDiag) return;
  permalinkText.textContent = buildPermalink();
  permalinkText.title = permalinkText.textContent;
}

// â”€â”€ Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function render() {
  svgEl.innerHTML = "";
  const n = currentN;

  const hw = 0.866 * n * S + S;
  const hh = 2 * n * S + S;
  svgEl.setAttribute("viewBox", `${-hw} ${-hh} ${2 * hw} ${2 * hh}`);

  const showPaths = document.getElementById("chk-paths").checked;
  const showVertices = document.getElementById("chk-vertices").checked;
  const showRhombusEdges = document.getElementById("chk-rhombus-edges").checked;
  const showDiagEdges = document.getElementById("chk-diag-edges").checked;
  const unboundedMode = document.getElementById("sel-unbounded").value;
  renderLayer = makeRenderLayer(n);
  svgEl.appendChild(renderLayer);

  // Region fills (drawn first so they're behind edges/paths)
  if (document.getElementById("chk-fills").checked) {
    const regionColors = computeRegionColors(currentRhombi, currentHasDiag, currentVertexMap, n, unboundedMode);
    drawAllFills(currentRhombi, currentHasDiag, currentVertexMap, regionColors);
  }

  // Rhombus edges
  if (showRhombusEdges) {
    for (const [, [a, b]] of currentEdgeMap) {
      addLine(a.x, a.y, b.x, b.y, EDGE_COLOR, EDGE_W);
    }
  }

  // Build path segments (also returns diagonal edges to draw)
  const { segmentsByEdge, allMixedEdges, diagonalEdges } = buildPathSegments(currentRhombi, currentHasDiag, currentVertexMap);

  // Diagonal edges (only for triangulated rhombi)
  if (showDiagEdges) {
    for (const [a, b] of diagonalEdges) {
      addLine(a.x, a.y, b.x, b.y, DIAG_COLOR, DIAG_W);
    }
  }

  // Hexagon boundary
  let p = { x: 0, y: 0 };
  for (let d = 0; d < 3; d++)
    for (let i = 0; i < n; i++) {
      const nx = p.x + E[d].x, ny = p.y + E[d].y;
      addLine(p.x, p.y, nx, ny, BOUNDARY_COLOR, BOUNDARY_W);
      p = { x: nx, y: ny };
    }
  for (let d = 0; d < 3; d++)
    for (let i = 0; i < n; i++) {
      const nx = p.x - E[d].x, ny = p.y - E[d].y;
      addLine(p.x, p.y, nx, ny, BOUNDARY_COLOR, BOUNDARY_W);
      p = { x: nx, y: ny };
    }

  // Paths
  if (showPaths) {
    const paths = tracePaths(segmentsByEdge, allMixedEdges);
    for (let i = 0; i < paths.length; i++) {
      const d = pathToSVGd(paths[i].beziers);
      if (d) addPath(d, PATH_COLOR, PATH_W);
    }
  }

  // Vertices
  if (showVertices) {
    for (const [, v] of currentVertexMap) {
      addCircle(v.x, v.y, VERTEX_R, v.sign === 1 ? POS_COLOR : NEG_COLOR);
    }
  }
}

// â”€â”€ UI â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

const inputN = document.getElementById("input-n");
const stratSelect = document.getElementById("input-strategy");
const inputDiag = document.getElementById("input-diag");
const diagVal = document.getElementById("diag-val");

inputDiag.addEventListener("input", () => { diagVal.textContent = inputDiag.value; });

for (const name of STRATEGY_NAMES) {
  const opt = document.createElement("option");
  opt.value = name;
  opt.textContent = STRATEGY_LABELS[name];
  stratSelect.appendChild(opt);
}

function generate() {
  currentN = parseInt(inputN.value, 10);
  if (isNaN(currentN) || currentN < 2 || currentN > 50) return alert("n must be 2â€“50.");
  const diagProb = parseInt(inputDiag.value, 10) / 100;
  const { rhombi, code } = generateTiling(currentN, stratSelect.value);
  currentRhombi = rhombi;
  currentCode = code;
  currentHasDiag = currentRhombi.map(() => Math.random() < diagProb);
  const { vertexMap, edges } = collectVerticesAndEdges(currentRhombi);
  currentVertexMap = vertexMap;
  currentEdgeMap = edges;
  assignSigns(currentVertexMap);
  updatePermalink();
  render();
}

function resign() {
  if (!currentVertexMap) return;
  assignSigns(currentVertexMap);
  updatePermalink();
  render();
}

document.getElementById("btn-generate").addEventListener("click", generate);
document.getElementById("btn-resign").addEventListener("click", resign);
document.getElementById("chk-fills").addEventListener("change", () => { if (currentRhombi) render(); });
document.getElementById("chk-paths").addEventListener("change", () => { if (currentRhombi) render(); });
document.getElementById("chk-vertices").addEventListener("change", () => { if (currentRhombi) render(); });
document.getElementById("chk-rhombus-edges").addEventListener("change", () => { if (currentRhombi) render(); });
document.getElementById("chk-diag-edges").addEventListener("change", () => { if (currentRhombi) render(); });
document.getElementById("sel-unbounded").addEventListener("change", () => { if (currentRhombi) render(); });
document.getElementById("btn-export-svg").addEventListener("click", () => {
  const serializer = new XMLSerializer();
  const str = serializer.serializeToString(svgEl);
  const blob = new Blob([str], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `zonal-patchworking-n${currentN}.svg`;
  a.click();
  URL.revokeObjectURL(url);
});
copyLinkBtn.addEventListener("click", () => {
  if (!permalinkText.textContent) return;
  navigator.clipboard.writeText(permalinkText.textContent);
  copyLinkBtn.classList.add("copied");
  setTimeout(() => copyLinkBtn.classList.remove("copied"), 600);
});

generate();
</script>
